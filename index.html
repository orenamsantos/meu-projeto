<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desinx</title>
  <meta name="description" content="Descubra por que seu corpo resiste a emagrecer e como inverter isso em 2 minutos.">

  <!-- Preload logo for LCP -->
  <link rel="preload" href="logo.webp" as="image">

  <!-- Fonts — performance otimizada -->
  <!-- Preconnect para eliminar latência de DNS/TLS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- DM Sans: non-render-blocking (print trick) with noscript fallback -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"></noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap"></noscript>


  <!-- Critical CSS (above-the-fold) -->
  <style>
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #0A7B83;
  --primary-light: #0a7b8318;
  --primary-mid: #0a7b8340;
  --accent: #17B8A2;
  --accent-light: #17b8a220;
  --bg: #FAF8F5;
  --bg-card: #FFFFFF;
  --text: #2D2D2D;
  --text-light: #6B7280;
  --coral: #E85D4A;
  --coral-light: #e85d4a15;
  --danger: #DC2626;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
  --radius: 12px;
  --radius-lg: 16px;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-display: 'Playfair Display', Georgia, serif;
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(10, 123, 131, 0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(23, 184, 162, 0.05) 0%, transparent 60%),
    var(--bg);
}


/* ===== LAYOUT ===== */
.quiz-container {
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 16px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
  </style>

  <!-- Non-critical CSS (loaded async) -->
  <link rel="stylesheet" href="styles-opt.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="styles-opt.css"></noscript>

  <!-- Ticto Echo: repasse automático de UTMs para o checkout -->
  <script defer src="https://echo.ticto.app/ticto-echo.min.js"></script>

</head>
<body>

  <div class="quiz-container" id="app">

    <!-- Progress Bar -->
    <div class="progress-bar" id="progressBar">
      <div class="progress-phase" data-phase="1">
        <div class="progress-phase-label">Diagnóstico</div>
        <div class="progress-phase-bar"></div>
      </div>
      <div class="progress-phase" data-phase="2">
        <div class="progress-phase-label">Histórico</div>
        <div class="progress-phase-bar"></div>
      </div>
      <div class="progress-phase" data-phase="3">
        <div class="progress-phase-label">Calibração</div>
        <div class="progress-phase-bar"></div>
      </div>
      <div class="progress-phase" data-phase="4">
        <div class="progress-phase-label">Perfil</div>
        <div class="progress-phase-bar"></div>
      </div>
    </div>

    <!-- Quiz Steps (rendered by JS) -->
    <div id="stepsContainer"></div>

  </div>

  <!-- Toast Notifications -->
  <div class="toast" id="toast"></div>

  <!-- Exit Intent Modal -->
  <div class="exit-modal" id="exitModal">
    <div class="exit-modal-content">
      <button class="exit-close" onclick="closeExitModal()">×</button>
      <div class="exit-icon">🎁</div>
      <h2 class="exit-title">Você já está na metade da análise.</h2>
      <p class="exit-desc">Faltam poucas perguntas pra montar seu protocolo personalizado. Se sair agora, vai precisar <strong>recomeçar do zero</strong>.</p>
      <button class="btn-primary" onclick="acceptExitOffer()">Continuar minha análise →</button>
      <button class="btn-text" onclick="closeExitModal()">Não, prefiro sair</button>
    </div>
  </div>


  <!-- App Logic (deferred) -->
  <script src="app-opt.js" defer></script>
